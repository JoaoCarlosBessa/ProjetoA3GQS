    steps:
      - name: Baixar código com histórico completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # necessário para o merge ter acesso a todas as branches
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar identidade do Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fazer merge da Dev na main
        run: |
          git checkout main
          git merge origin/Dev --no-ff -m "ci: merge automático Dev → main [run #${{ github.run_number }}]"
          git push origin main

  # ─────────────────────────────────────────
  # JOB 6: Notificação de FALHA
  # ─────────────────────────────────────────
  notificar-falha:
    name: 📧 Notificar Falha
    runs-on: ubuntu-latest
    needs: [testes-unitarios, testes-integracao, testes-sistema, cobertura, complexidade]
    if: failure()
    steps:
      - name: Enviar e-mail de falha
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Pipeline falhou na dev — ${{ github.repository }}"
          to: ${{ secrets.EMAIL_DESTINATARIO }}
          from: "CI/CD Mobilidade Inteligente <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            ❌ O pipeline falhou — o merge para main foi bloqueado.

            ─────────────────────────────
            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}
            Mensagem    : ${{ github.event.head_commit.message }}
            ─────────────────────────────

            Veja os logs e corrija antes de fazer um novo push:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ─────────────────────────────────────────
  # JOB 7: Notificação de SUCESSO
  # ─────────────────────────────────────────
  notificar-sucesso:
    name: 🎉 Notificar Sucesso
    runs-on: ubuntu-latest
    needs: promover-para-main
    if: success()
    steps:
      - name: Enviar e-mail de sucesso
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ Merge realizado — Dev → main"
          to: ${{ secrets.EMAIL_DESTINATARIO }}
          from: "CI/CD Mobilidade Inteligente <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            ✅ Todos os testes passaram! O código foi promovido para a main.

            ─────────────────────────────
            Repositório : ${{ github.repository }}
            Branch      : Dev → main
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}
            Mensagem    : ${{ github.event.head_commit.message }}
            ─────────────────────────────

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
