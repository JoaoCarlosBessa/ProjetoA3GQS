name: CI/CD — Mobilidade Inteligente

on:
  push:
    branches: [Dev]        # pipeline roda a cada push na dev
  pull_request:
    branches: [Dev]        # e em PRs abertos para a dev

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Testes unitários
  # ─────────────────────────────────────────
  testes-unitarios:
    name: 🧪 Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: pytest tests/test_unit.py -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2: Testes de integração
  # ─────────────────────────────────────────
  testes-integracao:
    name: 🔗 Testes de Integração
    runs-on: ubuntu-latest
    needs: testes-unitarios
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: pytest tests/test_integration.py -v --tb=short

  # ─────────────────────────────────────────
  # JOB 3: Testes de sistema
  # ─────────────────────────────────────────
  testes-sistema:
    name: 🖥️ Testes de Sistema
    runs-on: ubuntu-latest
    needs: testes-integracao
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: pytest tests/test_system.py -v --tb=short

  # ─────────────────────────────────────────
  # JOB 4: Cobertura de código
  # ─────────────────────────────────────────
  cobertura:
    name: 📊 Cobertura de Código
    runs-on: ubuntu-latest
    needs: [testes-unitarios, testes-integracao, testes-sistema]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: pytest --cov=app --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        with:
          name: relatorio-cobertura
          path: coverage.xml

  # ─────────────────────────────────────────
  # JOB 5: Complexidade ciclomática
  # Bloqueia o merge se alguma função ultrapassar
  # o limiar definido (nota C ou acima)
  # ─────────────────────────────────────────
  complexidade:
    name: 🔬 Complexidade Ciclomática
    runs-on: ubuntu-latest
    needs: cobertura
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install radon

      - name: Relatório de complexidade (cc)
        run: |
          echo "=== Complexidade por função ==="
          radon cc app.py -s -a
          echo ""
          echo "=== Índice de manutenibilidade (mi) ==="
          radon mi app.py -s

      - name: Bloquear se complexidade > B (limiar C ou acima)
        run: |
          resultado=
          if [ -n "" ]; then
            echo "❌ Funções com complexidade ALTA (C ou acima) detectadas:"
            echo ""
            exit 1
          fi
          echo "✅ Todas as funções dentro do limiar (A ou B)."

      - name: Salvar relatório como artefato
        run: radon cc app.py -s -a --json > complexidade.json

      - uses: actions/upload-artifact@v4
        with:
          name: relatorio-complexidade
          path: complexidade.json

  # ─────────────────────────────────────────
  # JOB 6: Merge automático dev → main
  # Só executa se todos os testes passaram
  # e o evento for um push direto na dev
  # ─────────────────────────────────────────
  promover-para-main:
    name: 🔀 Promover Dev → main
    runs-on: ubuntu-latest
